<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- ✅ Mobile Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GarbageWatch</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/main.css">

    <!-- ✅ UI POLISH -->
    <style>
        body {
            background-color: #f5f7fa;
            font-family: Arial, sans-serif;
        }

        .navbar-brand {
            font-weight: bold;
            letter-spacing: 1px;
        }

        .card {
            border-radius: 12px;
        }

        .card-hover:hover {
            transform: translateY(-5px);
            transition: 0.3s;
        }

        .btn {
            border-radius: 8px;
        }

        .badge {
            padding: 6px 10px;
            font-size: 13px;
        }

        /* Status Colors */
        .badge-cleaned { background-color: #198754; }
        .badge-ongoing { background-color: #fd7e14; }
        .badge-not { background-color: #dc3545; }

        /* Footer */
        .footer {
            background-color: #ffffff;
            padding: 15px;
            border-top: 1px solid #ddd;
        }
    </style>
</head>

<body>

<!-- ✅ NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-success sticky-top shadow">
  <div class="container">
    <a class="navbar-brand" href="/">🗑️ GarbageWatch</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">

        <li class="nav-item">
          <a class="nav-link" href="/">
            <i class="bi bi-house"></i> Home
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/report">
            <i class="bi bi-plus-circle"></i> Report
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/map">
            <i class="bi bi-geo-alt"></i> Map
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/about">
            <i class="bi bi-info-circle"></i> About
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link btn btn-light text-success ms-2 px-3" href="/admin/login">
            Admin
          </a>
        </li>

      </ul>
    </div>
  </div>
</nav>

<!-- ✅ CONTENT -->
<div class="container my-4">
    {% block content %}{% endblock %}
</div>

<!-- ✅ FOOTER -->
<footer class="footer text-center mt-5">
  <p class="mb-0">© 2026 GarbageWatch — Spot. Report. Clean.</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
