<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GarbageWatch</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/main.css">


    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }
        .navbar-brand {
            font-weight: bold;
            letter-spacing: 1px;
        }
        .card-hover:hover {
            transform: translateY(-5px);
            transition: 0.3s;
        }
        .badge-cleaned { background-color: #198754; }
        .badge-ongoing { background-color: #fd7e14; }
        .badge-not { background-color: #dc3545; }
    </style>
</head>

<body>

<!-- ✅ NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-success sticky-top shadow">
  <div class="container">
    <a class="navbar-brand" href="/">🗑️ GarbageWatch</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="/report">Report</a></li>
        <li class="nav-item"><a class="nav-link" href="/map">Map</a></li>
        <li class="nav-item"><a class="nav-link" href="/about">About</a></li>
        <li class="nav-item"><a class="nav-link btn btn-light text-success ms-2" href="/admin/login">Admin</a></li>
      </ul>
    </div>
  </div>
</nav>
<footer class="footer text-center mt-5">
  <p class="mb-0">© 2026 GarbageWatch — Spot. Report. Clean.</p>
</footer>


<!-- ✅ CONTENT -->
<div class="container my-4">
    {% block content %}{% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
