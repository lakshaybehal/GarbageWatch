{% extends "base.html" %}

{% block content %}

<h2 class="text-center mb-3">GarbageWatch Map (Approved Spots)</h2>

<!-- ✅ FILTER BUTTONS -->
<div class="mb-3 text-center">

  <button class="btn btn-dark active" onclick="filterSpots('all'); setActive(this)">All</button>

  <button class="btn btn-success" onclick="filterSpots('cleaned'); setActive(this)">
    Cleaned
  </button>

  <button class="btn btn-warning" onclick="filterSpots('ongoing'); setActive(this)">
    Ongoing
  </button>

  <button class="btn btn-danger" onclick="filterSpots('not_cleaned'); setActive(this)">
    Not Cleaned
  </button>

</div>

<!-- ✅ MAP -->
<div id="map" style="height: 500px;"></div>

<!-- Leaflet CSS -->
<link rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // ✅ Create Map
    var map = L.map("map").setView([31.3260, 75.5762], 13);

    // ✅ Move zoom buttons (optional nice UI)
    map.zoomControl.setPosition('topright');

    // ✅ Load Tiles
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "© OpenStreetMap contributors"
    }).addTo(map);

    // ✅ Icons
    var greenIcon = new L.Icon({
        iconUrl: "https://maps.google.com/mapfiles/ms/icons/green-dot.png",
        iconSize: [32, 32]
    });

    var orangeIcon = new L.Icon({
        iconUrl: "https://maps.google.com/mapfiles/ms/icons/orange-dot.png",
        iconSize: [32, 32]
    });

    var redIcon = new L.Icon({
        iconUrl: "https://maps.google.com/mapfiles/ms/icons/red-dot.png",
        iconSize: [32, 32]
    });

    // ✅ Store markers
    var markers = [];

    function filterSpots(statusFilter) {

        // remove old markers
        markers.forEach(marker => map.removeLayer(marker));
        markers = [];

        {% for spot in spots %}

            var status = "{{ spot.status }}";

            if (statusFilter === "all" || statusFilter === status) {

                var iconUsed = redIcon;
                var statusText = "<span style='color:red;'>Not Cleaned</span>";

                if (status === "cleaned") {
                    iconUsed = greenIcon;
                    statusText = "<span style='color:green;'>Cleaned</span>";
                }
                else if (status === "ongoing") {
                    iconUsed = orangeIcon;
                    statusText = "<span style='color:orange;'>Ongoing</span>";
                }

                var marker = L.marker([{{ spot.latitude }}, {{ spot.longitude }}], {icon: iconUsed})
                    .bindPopup(`
                        <div style="width:200px">
                            <h6>{{ spot.place_name }}</h6>
                            <p><b>Status:</b> ${statusText}</p>
                            <a href="/spot/{{ spot.id }}" class="btn btn-sm btn-primary">
                                View Details
                            </a>
                        </div>
                    `);

                marker.addTo(map);
                markers.push(marker);
            }

        {% endfor %}

        // ✅ Optional: no result message
        if (markers.length === 0) {
            alert("No spots found for this filter");
        }
    }

    // ✅ Active button UI
    function setActive(button) {
        document.querySelectorAll(".btn").forEach(btn => btn.classList.remove("active"));
        button.classList.add("active");
    }

    // ✅ Default load
    filterSpots("all");

</script>

{% endblock %}
